apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: myregistry.io/app:v1.0.0
          env:
            - name: SIDECAR_IMAGE
              value: myregistry.io/sidecar:v1.0.0
            - name: APP_PORT
              value: "8080"
