name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BIN=helm-package-images
          if [ "$GOOS" = "windows" ]; then
            BIN="${BIN}.exe"
          fi
          go build -o "${BIN}" .

      - name: Package tarball
        run: |
          BIN=helm-package-images
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
            BIN="${BIN}${EXT}"
          fi
          TARBALL="helm-package-images_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -cvzf "${TARBALL}" "${BIN}" "plugin.yaml" "scripts/"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
